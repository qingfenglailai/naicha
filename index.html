<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>奶茶摇奖 🧋</title>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 25%, #ffeaa7 50%, #dfe6e9 75%, #a29bfe 100%);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ===== 标题 ===== */
    .page-title {
      text-align: center;
      margin-bottom: 30px;
      animation: fadeInDown 0.8s ease;
    }
    .page-title h1 {
      font-size: 2.8rem;
      color: #fff;
      text-shadow: 2px 4px 12px rgba(0,0,0,0.25);
      letter-spacing: 4px;
    }
    .page-title p {
      margin-top: 8px;
      color: rgba(255,255,255,0.85);
      font-size: 1rem;
      letter-spacing: 2px;
    }

    /* ===== 主卡片 ===== */
    .main-card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.6);
      padding: 40px 50px;
      width: 100%;
      max-width: 700px;
      animation: fadeInUp 0.9s ease;
    }

    /* ===== 转盘展示区 ===== */
    .slot-wrapper {
      position: relative;
      height: 210px;
      overflow: hidden;
      border-radius: 20px;
      background: linear-gradient(135deg, #f5f7fa, #e8ecf1);
      border: 3px solid #e0d5fb;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }

    /* 遮罩渐变 */
    .slot-wrapper::before,
    .slot-wrapper::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 50px;
      z-index: 2;
      pointer-events: none;
    }
    .slot-wrapper::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(245,247,250,1), transparent);
    }
    .slot-wrapper::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(245,247,250,1), transparent);
    }

    /* 中间高亮线 */
    .slot-highlight {
      position: absolute;
      top: 50%;
      left: 10px; right: 10px;
      transform: translateY(-50%);
      height: 68px;
      background: linear-gradient(135deg, rgba(162,155,254,0.18), rgba(253,121,168,0.18));
      border-radius: 14px;
      border: 2px solid rgba(162,155,254,0.5);
      z-index: 1;
      pointer-events: none;
    }

    .slot-inner {
      position: absolute;
      top: 0; left: 0; right: 0;
    }

    .slot-item {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 0 20px;
    }
    .slot-item .shop-img {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      flex-shrink: 0;
      background: #f0eeff;
    }
    .slot-item .name {
      font-size: 1.25rem;
      font-weight: 700;
      color: #5a4a8a;
      letter-spacing: 1px;
    }

    /* ===== 结果展示 ===== */
    .result-box {
      text-align: center;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      padding: 20px;
      border-radius: 18px;
      background: linear-gradient(135deg, #f8f6ff, #fff0f5);
      border: 2px dashed #e0d5fb;
      transition: all 0.4s;
    }
    .result-box .result-img {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      object-fit: cover;
      margin-bottom: 12px;
      display: block;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      background: #f0eeff;
    }
    .result-box .result-name {
      font-size: 1.6rem;
      font-weight: 800;
      color: #6c3fc5;
      letter-spacing: 2px;
    }
    .result-box .result-desc {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #a0a0b0;
    }
    .result-box .result-hint {
      font-size: 1rem;
      color: #bbb;
      letter-spacing: 1px;
    }
    .result-box.win {
      background: linear-gradient(135deg, #fff7e6, #fff0fb);
      border: 2px solid #f9ca24;
      box-shadow: 0 0 30px rgba(249,202,36,0.2);
    }

    @keyframes bounceIn {
      0%   { transform: scale(0.3); opacity: 0; }
      50%  { transform: scale(1.1); opacity: 1; }
      70%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    @keyframes spin360 {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .spinning {
      animation: spin360 0.5s linear infinite;
      display: inline-block;
    }
    .result-win-anim {
      animation: bounceIn 0.6s cubic-bezier(0.68,-0.55,0.27,1.55) forwards;
    }

    /* ===== 按钮 ===== */
    .btn-draw {
      display: block;
      width: 100%;
      padding: 18px 0;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 6px;
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #a29bfe, #fd79a8, #fdcb6e);
      background-size: 200% 200%;
      background-position: 0% 50%;
      box-shadow: 0 8px 25px rgba(162,155,254,0.45);
      transition: all 0.35s, background-position 0.5s;
      position: relative;
      overflow: hidden;
    }
    .btn-draw::after {
      content: '';
      position: absolute;
      top: -50%; left: -60%;
      width: 30%;
      height: 200%;
      background: rgba(255,255,255,0.25);
      transform: skewX(-20deg);
      transition: left 0.5s;
    }
    .btn-draw:hover:not(:disabled)::after { left: 140%; }
    .btn-draw:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(162,155,254,0.55);
      background-position: 100% 50%;
    }
    .btn-draw:active:not(:disabled) { transform: translateY(0); }
    .btn-draw:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== 奶茶展示列表 ===== */
    .tea-list-title {
      font-size: 0.85rem;
      color: #aaa;
      text-align: center;
      letter-spacing: 2px;
      margin: 28px 0 14px;
    }
    .tea-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
    }
    .tea-card {
      background: linear-gradient(135deg, #f8f6ff, #fff8fc);
      border: 1.5px solid #e8e0fb;
      border-radius: 16px;
      padding: 14px 8px;
      text-align: center;
      cursor: default;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .tea-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(162,155,254,0.2);
      border-color: #a29bfe;
    }
    .tea-card.highlight {
      border-color: #f9ca24;
      background: linear-gradient(135deg, #fff7e6, #fff0fb);
      box-shadow: 0 0 18px rgba(249,202,36,0.35);
      transform: translateY(-6px) scale(1.06);
    }
    .tea-card .t-img {
      width: 52px; height: 52px;
      border-radius: 14px;
      object-fit: cover;
      display: block;
      margin: 0 auto 8px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      background: #f0eeff;
    }
    .tea-card .t-name  { font-size: 0.78rem; color: #6c3fc5; font-weight: 700; line-height: 1.4; }
    .tea-card .t-prob  {
      display: inline-block;
      margin-top: 5px;
      font-size: 0.68rem;
      color: #fff;
      background: linear-gradient(135deg, #a29bfe, #fd79a8);
      border-radius: 20px;
      padding: 1px 7px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .tea-card.highlight .t-prob {
      background: linear-gradient(135deg, #f9ca24, #e17055);
    }

    /* ===== 彩带 ===== */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* ===== 页脚 ===== */
    .footer {
      margin-top: 24px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="page-title">
  <h1>🧋 奶茶摇奖</h1>
  <p>今天去哪家？ 让命运来决定！</p>
</div>

<div class="main-card">

  <!-- 滚动槽 -->
  <div class="slot-wrapper">
    <div class="slot-highlight"></div>
    <div class="slot-inner" id="slotInner"></div>
  </div>

  <!-- 结果 -->
  <div class="result-box" id="resultBox">
    <span class="result-hint">点击下方按钮开始摇奖 ✨</span>
  </div>

  <!-- 抽奖按钮 -->
  <button class="btn-draw" id="btnDraw">🎰 开始摇奖</button>

  <!-- 奶茶列表 -->
  <div class="tea-list-title">— 参与摇奖的奶茶店 —</div>
  <div class="tea-grid" id="teaGrid"></div>

</div>

<div class="footer">© 2026 奶茶摇奖机 · 快乐每一天</div>

<script>
// ============================================================
//  奶茶店数据 —— 在此维护
//  image  : 店铺 Logo 图片路径（本地路径 或 网络URL均可）
//  name   : 奶茶店名称
//  desc   : 品牌简介
//  weight : 中奖权重，所有店铺相同 → 每家概率完全相等
// ============================================================
var teaList = [

  },
  {

  },

  },
  {

// ============================================================
//  初始化
// ============================================================
$(function () {

  // 渲染底部奶茶列表
  renderTeaGrid();

  // 初始化滚动槽（多拷贝以保证循环效果）
  initSlot();

  // 绑定按钮事件
  $('#btnDraw').on('click', startDraw);

});

// ---- 加权随机：返回 teaList 中命中的索引 ----
function weightedRandom() {
  var totalWeight = 0;
  $.each(teaList, function (_, tea) {
    totalWeight += (tea.weight || 1);
  });
  var rand = Math.random() * totalWeight;
  var cumulative = 0;
  for (var i = 0; i < teaList.length; i++) {
    cumulative += (teaList[i].weight || 1);
    if (rand < cumulative) return i;
  }
  return teaList.length - 1;
}

// ---- 渲染奶茶店列表（显示概率标签） ----
function renderTeaGrid() {
  var totalWeight = 0;
  $.each(teaList, function (_, tea) { totalWeight += (tea.weight || 1); });

  var html = '';
  $.each(teaList, function (i, tea) {
    var pct = (((tea.weight || 1) / totalWeight) * 100).toFixed(1);
    html += '<div class="tea-card" data-index="' + i + '">';
    html += '  <img class="t-img" src="' + tea.image + '" alt="' + tea.name + '" />';
    html += '  <span class="t-name">' + tea.name + '</span>';
    html += '  <span class="t-prob">' + pct + '%</span>';
    html += '</div>';
  });
  $('#teaGrid').html(html);
}

// ---- 初始化滚动槽 ----
function initSlot() {
  var repeated = [];
  // 重复3遍保证滚动不断
  for (var r = 0; r < 3; r++) {
    $.each(teaList, function (i, tea) {
      repeated.push(tea);
    });
  }
  var html = '';
  $.each(repeated, function (i, tea) {
    html += '<div class="slot-item">';
    html += '  <img class="shop-img" src="' + tea.image + '" alt="' + tea.name + '" />';
    html += '  <span class="name">' + tea.name + '</span>';
    html += '</div>';
  });
  $('#slotInner').html(html);

  // 初始位置居中在第一段中间
  positionSlot(0, false);
}

// ---- 设置滚动槽位置 (idx = teaList 索引，offset=第几轮) ----
function positionSlot(idx, animate) {
  var itemH     = 68;
  var wrapH     = 210;
  var center    = (wrapH - itemH) / 2;
  var targetTop = center - idx * itemH;
  if (animate === false) {
    $('#slotInner').css('top', targetTop + 'px');
  }
  return targetTop;
}

// ============================================================
//  抽奖主逻辑
// ============================================================
var isDrawing = false;

function startDraw() {
  if (isDrawing) return;
  isDrawing = true;

  var $btn = $('#btnDraw');
  $btn.prop('disabled', true).text('🎲 摇奖中...');

  // 清除上次高亮
  $('.tea-card').removeClass('highlight');
  $('#resultBox').removeClass('win').html('<span class="result-hint"><span class="spinning">🎰</span> 摇奖中，请稍候...</span>');

  // 加权随机结果
  var winIdx = weightedRandom();

  // 滚动动画参数
  var itemH    = 68;
  var wrapH    = 210;
  var center   = (wrapH - itemH) / 2;
  var totalItems = teaList.length;

  // 多滚几圈后停在 winIdx（第1批，即索引 totalItems + winIdx）
  var spinRounds = 3;  // 额外多转的圈数
  var finalIdx   = totalItems + winIdx;  // 停在第2批（索引从0的第1段）
  var endTop     = center - finalIdx * itemH;

  // 先让它从当前快速滚到很远（制造连续感）
  var $inner   = $('#slotInner');
  var startTop = parseInt($inner.css('top')) || center;

  // 整体要滚过的距离：再滚 spinRounds 圈 + 停到目标
  var extraScroll = spinRounds * totalItems * itemH;
  var animTarget  = endTop - extraScroll;

  // 分阶段动画：加速 → 匀速 → 减速停止
  var duration1 = 500;   // 加速
  var duration2 = 1500;  // 匀速
  var duration3 = 1200;  // 减速

  // 加速段：滚到 mid1
  var mid1 = startTop - 1 * totalItems * itemH;
  // 匀速段：再滚
  var mid2 = animTarget + 1 * totalItems * itemH;

  $inner.stop(true).animate({ top: mid1 }, {
    duration: duration1,
    easing: 'swing',
    complete: function () {
      $inner.animate({ top: mid2 }, {
        duration: duration2,
        easing: 'linear',
        complete: function () {
          $inner.animate({ top: endTop }, {
            duration: duration3,
            easing: 'easeOutBounce',
            complete: function () {
              showResult(winIdx);
            }
          });
        }
      });
    }
  });
}

// ---- 展示结果 ----
function showResult(winIdx) {
  var tea = teaList[winIdx];

  var html = '<img class="result-img result-win-anim" src="' + tea.image + '" alt="' + tea.name + '" />';
  html += '<span class="result-name">' + tea.name + '</span>';
  html += '<span class="result-desc">' + tea.desc + '</span>';

  $('#resultBox').addClass('win').html(html);

  // 高亮对应奶茶卡片
  $('.tea-card[data-index=' + winIdx + ']').addClass('highlight')[0]
    .scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // 彩带
  launchConfetti();

  // 恢复按钮
  $('#btnDraw').prop('disabled', false).text('🎰 再摇一次');
  isDrawing = false;
}

// ============================================================
//  jQuery easing 补丁：easeOutBounce
// ============================================================
$.easing.easeOutBounce = function (x) {
  var n1 = 7.5625, d1 = 2.75;
  if (x < 1 / d1) {
    return n1 * x * x;
  } else if (x < 2 / d1) {
    return n1 * (x -= 1.5 / d1) * x + 0.75;
  } else if (x < 2.5 / d1) {
    return n1 * (x -= 2.25 / d1) * x + 0.9375;
  } else {
    return n1 * (x -= 2.625 / d1) * x + 0.984375;
  }
};

// ============================================================
//  彩带效果
// ============================================================
function launchConfetti() {
  var canvas  = document.getElementById('confetti-canvas');
  var ctx     = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  var colors  = ['#a29bfe','#fd79a8','#fdcb6e','#55efc4','#74b9ff','#e17055','#00cec9','#fab1a0'];
  var pieces  = [];
  var count   = 140;

  for (var i = 0; i < count; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 10 + 6,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      angle: Math.random() * Math.PI * 2,
      speed: Math.random() * 3 + 2,
      spin:  (Math.random() - 0.5) * 0.2
    });
  }

  var frame;
  var elapsed = 0;
  var maxMs   = 3500;
  var last    = Date.now();

  function draw() {
    var now = Date.now();
    elapsed += now - last;
    last = now;
    if (elapsed > maxMs) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      cancelAnimationFrame(frame);
      return;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    $.each(pieces, function (_, p) {
      p.y     += p.speed;
      p.angle += p.spin;
      if (p.y > canvas.height) { p.y = -p.h; p.x = Math.random() * canvas.width; }
      ctx.save();
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - elapsed / maxMs);
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    frame = requestAnimationFrame(draw);
  }
  draw();
}
</script>
</body>
